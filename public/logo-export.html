<!DOCTYPE html>
<html>
<head>
<style>

  * { margin: 0; padding: 0; }
  body { background: transparent; }
  .dark-logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: #0a1628;
    padding: 20px 32px 20px 20px;
